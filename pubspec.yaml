name: shop
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4


#------------------- packages -------------------#
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  iconsax_flutter: ^1.0.1

  #state manageament
  get: ^4.7.3

  #product specific


#------------------- packages end -------------------#

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


#------------------- local assests -------------------#

assests:
  - assests/images/
  - assests/icons/
  - assests/logos/


#------------------- local fonts -------------------#

fonts:
  - family: poppins
    fonts:
      - asset: assests/fonts/Poppins-Regular.ttf
        weight: 400
      - asset: assests/fonts/Poppins-Bold.ttf
        weight: 800
      - asset: assests/fonts/Poppins-Medium.ttf
        weight: 500
      - asset: assests/fonts/Poppins-SemiBold.ttf
        weight: 600
      - asset: assests/fonts/Poppins-Light.ttf 
        weight: 300
      - asset: assests/fonts/Poppins-ExtraBold.ttf
        weight: 900
      - asset: assests/fonts/Poppins-Italic.ttf
        style: italic